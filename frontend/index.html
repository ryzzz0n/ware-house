<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WareHouse</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080a;--s1:#0d0f12;--s2:#12151a;--s3:#1a1e25;
  --b1:#232830;--b2:#2e3540;--b3:#3d4656;
  --accent:#e8ff47;--accent2:#b8cc2a;
  --text:#eef0f4;--t2:#8b93a4;--t3:#4e5668;
  --red:#ff5252;--green:#52ffb8;--amber:#ffb852;--blue:#52a8ff;--purple:#b852ff;
  --r:8px;--rlg:14px;
  --mono:"JetBrains Mono",monospace;--sans:"Outfit",sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
#root{height:100%;display:flex}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px}
button,input,textarea,select{font-family:var(--sans);outline:none;border:none}
button{cursor:pointer}
input::placeholder,textarea::placeholder{color:var(--t3)}
.sidebar{width:220px;min-width:220px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow:hidden}
.sidebar-top{padding:20px 16px 16px;border-bottom:1px solid var(--b1)}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:17px;height:17px}
.logo-text{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text)}
.logo-version{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:1px}
.nav{padding:8px;flex:1;overflow-y:auto}
.nav-label{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;padding:0 8px;margin-bottom:4px;margin-top:12px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);font-size:13px;font-weight:400;color:var(--t2);cursor:pointer;transition:all .12s;border:1px solid transparent;margin-bottom:1px;white-space:nowrap}
.nav-item svg{width:15px;height:15px;flex-shrink:0;opacity:.7}
.nav-item:hover{background:var(--s2);color:var(--text)}
.nav-item:hover svg{opacity:1}
.nav-item.active{background:var(--accent);color:#07080a;font-weight:500}
.nav-item.active svg{opacity:1}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--b1)}
.user-card{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--s2);border-radius:var(--r);border:1px solid var(--b1)}
.user-av{width:26px;height:26px;border-radius:6px;overflow:hidden;flex-shrink:0;border:1px solid var(--b2)}
.user-av img{width:100%;height:100%;object-fit:cover}
.user-email{font-size:11px;color:var(--t2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.user-role{font-family:var(--mono);font-size:9px;color:var(--t3)}
.logout-btn{width:24px;height:24px;border-radius:6px;background:transparent;border:none;color:var(--t3);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.logout-btn:hover{color:var(--red)}
.logout-btn svg{width:13px;height:13px}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--b1);background:var(--s1);position:sticky;top:0;z-index:10}
.page-title{font-size:16px;font-weight:600;color:var(--text)}
.api-status{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--t3)}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 2s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);font-size:13px;font-weight:500;cursor:pointer;transition:all .12s;border:1px solid transparent}
.btn svg{width:14px;height:14px}
.btn-accent{background:var(--accent);color:#07080a}
.btn-accent:hover{background:#f0ff60;transform:translateY(-1px)}
.btn-ghost{background:transparent;color:var(--t2);border-color:var(--b2)}
.btn-ghost:hover{background:var(--s2);color:var(--text);border-color:var(--b3)}
.btn-green{background:rgba(82,255,184,.1);color:var(--green);border-color:rgba(82,255,184,.2)}
.btn-green:hover{background:rgba(82,255,184,.2)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.content{padding:20px 24px;flex:1;animation:fadein .2s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stats-row-2{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:20px}
.stats-row-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.stat{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rlg);padding:16px 18px;transition:border-color .2s}
.stat:hover{border-color:var(--b3)}
.stat-label{font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.stat-val{font-size:26px;font-weight:700;line-height:1;font-family:var(--mono);letter-spacing:-1px}
.stat-sub{font-size:11px;color:var(--t3);margin-top:4px}
.c-accent{color:var(--accent)}.c-blue{color:var(--blue)}.c-green{color:var(--green)}.c-amber{color:var(--amber)}.c-red{color:var(--red)}.c-purple{color:var(--purple)}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rlg);overflow:hidden;margin-bottom:16px}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--b1)}
.card-title{font-size:13px;font-weight:600;color:var(--text)}
.search{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:7px 12px;width:200px}
.search svg{width:13px;height:13px;color:var(--t3);flex-shrink:0}
.search input{background:transparent;color:var(--text);font-size:12px;flex:1;width:100%}
table{width:100%;border-collapse:collapse}
th{font-family:var(--mono);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:.1em;padding:9px 16px;text-align:left;border-bottom:1px solid var(--b1);background:var(--s2)}
td{padding:11px 16px;border-bottom:1px solid var(--b1);font-size:13px;vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.015)}
.mono{font-family:var(--mono);font-size:11px;color:var(--t3)}
.price-cell{font-family:var(--mono);font-size:12px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:10px;font-weight:500;font-family:var(--mono)}
.b-green{background:rgba(82,255,184,.1);color:var(--green)}
.b-amber{background:rgba(255,184,82,.1);color:var(--amber)}
.b-red{background:rgba(255,82,82,.1);color:var(--red)}
.b-blue{background:rgba(82,168,255,.1);color:var(--blue)}
.b-purple{background:rgba(184,82,255,.1);color:var(--purple)}
.b-dim{background:var(--s2);color:var(--t2);border:1px solid var(--b1)}
.tag{display:inline-flex;padding:2px 8px;background:var(--s2);border:1px solid var(--b1);border-radius:5px;font-size:11px;color:var(--t2);font-family:var(--mono)}
.actions{display:flex;gap:4px}
.ic-btn{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid transparent;color:var(--t3);cursor:pointer;transition:all .12s}
.ic-btn svg{width:13px;height:13px}
.ic-btn:hover{background:var(--s2);border-color:var(--b1);color:var(--text)}
.ic-btn.del:hover{background:rgba(255,82,82,.08);border-color:rgba(255,82,82,.2);color:var(--red)}
.ic-btn.ok:hover{background:rgba(82,255,184,.08);border-color:rgba(82,255,184,.2);color:var(--green)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px;color:var(--t3);text-align:center;gap:8px}
.empty svg{width:32px;height:32px;opacity:.3;margin-bottom:4px}
.empty-title{font-size:14px;color:var(--t2);font-weight:500}
.loading-cell{text-align:center;padding:40px!important;color:var(--t3);font-family:var(--mono);font-size:11px}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.pulse{animation:pulse 1.4s ease infinite}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:100;animation:fadein .15s ease;backdrop-filter:blur(2px)}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:var(--rlg);padding:24px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto;animation:slideup .18s ease}
@keyframes slideup{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-size:15px;font-weight:600}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.modal-wide{width:600px}
.fg{margin-bottom:14px}
.fg label{display:block;font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.field{width:100%;padding:9px 12px;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);color:var(--text);font-size:13px;font-family:var(--sans);transition:border-color .12s}
.field:focus{border-color:var(--accent)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.err{background:rgba(255,82,82,.07);border:1px solid rgba(255,82,82,.2);border-radius:var(--r);padding:9px 12px;font-size:12px;color:var(--red);margin-bottom:14px}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:var(--r);font-size:12px;font-weight:500;z-index:200;display:flex;align-items:center;gap:8px;animation:slideup .2s ease}
.toast svg{width:14px;height:14px;flex-shrink:0}
.toast-ok{background:#0d1f14;border:1px solid rgba(82,255,184,.3);color:var(--green)}
.toast-err{background:#1f0d0d;border:1px solid rgba(255,82,82,.3);color:var(--red)}
.auth-wrap{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.auth-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rlg);padding:32px;width:380px;max-width:95vw}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.auth-logo-icon{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.auth-logo-icon svg{width:18px;height:18px}
.auth-logo-text{font-family:var(--mono);font-size:16px;font-weight:600;color:var(--text)}
.auth-sub{font-size:12px;color:var(--t3);font-family:var(--mono);margin-bottom:24px;padding-left:48px}
.auth-tabs{display:flex;border-bottom:1px solid var(--b1);margin-bottom:20px}
.auth-tab{padding:7px 16px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--t3);transition:all .12s;background:transparent;margin-bottom:-1px}
.auth-tab.active{color:var(--accent);border-color:var(--accent)}
.home{padding:32px;flex:1;animation:fadein .3s ease}
.home-hero{display:flex;align-items:flex-start;gap:32px;margin-bottom:32px;padding:28px;background:var(--s1);border:1px solid var(--b1);border-radius:20px;position:relative;overflow:hidden}
.home-hero::before{content:"";position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:radial-gradient(circle,rgba(232,255,71,.06) 0%,transparent 70%);pointer-events:none}
.home-avatar{width:90px;height:90px;border-radius:14px;overflow:hidden;flex-shrink:0;border:2px solid var(--b2)}
.home-avatar img{width:100%;height:100%;object-fit:cover}
.home-name{font-family:var(--mono);font-size:20px;font-weight:600;color:var(--text);margin-bottom:4px}
.home-role{font-size:12px;color:var(--accent);font-family:var(--mono);margin-bottom:10px}
.home-desc{font-size:13px;color:var(--t2);line-height:1.7;max-width:540px}
.home-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.home-tag{padding:3px 8px;background:var(--s2);border:1px solid var(--b2);border-radius:5px;font-size:10px;font-family:var(--mono);color:var(--t2)}
.home-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.home-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--rlg);padding:18px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.home-card:hover{border-color:var(--b3);transform:translateY(-2px)}
.home-card-icon{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.home-card-icon svg{width:17px;height:17px}
.home-card-title{font-size:13px;font-weight:600;margin-bottom:3px}
.home-card-desc{font-size:11px;color:var(--t3);line-height:1.5}
.home-card-arrow{position:absolute;top:14px;right:14px;color:var(--t3);opacity:0;transition:all .15s}
.home-card-arrow svg{width:13px;height:13px}
.home-card:hover .home-card-arrow{opacity:1;transform:translateX(2px)}
.doc-status{display:inline-flex;align-items:center;padding:2px 8px;border-radius:5px;font-size:10px;font-family:var(--mono);font-weight:500}
.doc-draft{background:rgba(139,147,164,.1);color:var(--t2);border:1px solid var(--b2)}
.doc-confirmed{background:rgba(82,255,184,.1);color:var(--green)}
.doc-cancelled{background:rgba(255,82,82,.1);color:var(--red)}
.items-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.item-row{display:grid;grid-template-columns:1fr 80px 80px 28px;gap:8px;align-items:center}
.add-item-btn{display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--s2);border:1px dashed var(--b2);border-radius:var(--r);font-size:12px;color:var(--t2);cursor:pointer;transition:all .12s;margin-top:8px;width:100%;justify-content:center}
.add-item-btn:hover{border-color:var(--accent);color:var(--accent)}
.zone-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;padding:16px}
.zone-card{background:var(--s2);border:1px solid var(--b1);border-radius:var(--rlg);padding:16px;transition:all .15s}
.zone-card:hover{border-color:var(--b3)}
.zone-name{font-size:14px;font-weight:600;margin-bottom:4px}
.zone-cells{font-size:11px;color:var(--t3)}
.move-type{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono)}
</style>
</head>

function getToken(){ return localStorage.getItem("wh_token") }
function setToken(t){ localStorage.setItem("wh_token",t) }
function clearToken(){ localStorage.removeItem("wh_token"); localStorage.removeItem("wh_email") }


function norm(item){
  if(!item) return item;
  if(Array.isArray(item)) return item.map(norm);
  if(typeof item !== "object") return item;
  const out = {};
  for(const k in item){
    const lk = k === "ID" ? "id" : k.charAt(0).toLowerCase()+k.slice(1);
    out[lk] = (item[k] && typeof item[k] === "object") ? norm(item[k]) : item[k];
  }
  return out;
}
async function api(path, opts={}){
  const token = getToken();
  const headers = { "Content-Type":"application/json", ...(token?{Authorization:"Bearer "+token}:{}) };
  const res = await fetch(BASE+path, { headers, ...opts });
  const body = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(body.message || body.error || "HTTP "+res.status);
  if(Array.isArray(body)) return body.map(norm);
  if(body && typeof body === "object") return norm(body);
  return body;
}

let toastTimer;
function Toast({t,set}){
  useEffect(()=>{ if(!t) return; clearTimeout(toastTimer); toastTimer=setTimeout(()=>set(null),3200); },[t]);
  if(!t) return null;
  return <div className={"toast "+(t.type==="ok"?"toast-ok":"toast-err")}>{t.type==="ok"?<I.check/>:<I.warn/>}{t.msg}</div>;
}

function StatusBadge({status}){
  const map={draft:["doc-status doc-draft","Черновик"],confirmed:["doc-status doc-confirmed","Проведён"],cancelled:["doc-status doc-cancelled","Отменён"],open:["doc-status doc-draft","Открыта"],closed:["doc-status doc-confirmed","Закрыта"]};
  const [cls,label]=map[status]||["doc-status doc-draft",status];
  return <span className={cls}>{label}</span>;
}

function Modal({title,onClose,wide,children}){
  useEffect(()=>{ const h=e=>{if(e.key==="Escape")onClose()}; document.addEventListener("keydown",h); return()=>document.removeEventListener("keydown",h); },[]);
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className={"modal"+(wide?" modal-wide":"")}>
        <div className="modal-head"><div className="modal-title">{title}</div><button className="ic-btn" onClick={onClose}><I.x/></button></div>
        {children}
      </div>
    </div>
  );
}

function Auth({onLogin}){
  const [tab,setTab]=useState("login");
  const [email,setEmail]=useState("");
  const [pass,setPass]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  async function submit(e){
    e.preventDefault(); setErr(""); setLoading(true);
    try{
      const data=await api("/"+tab,{method:"POST",body:JSON.stringify({email,password:pass})});
      if(tab==="login"){ setToken(data.token||data.access_token||data.jwt||(data.data&&data.data.token)||""); localStorage.setItem("wh_email",email); onLogin(); }
      else setTab("login");
    }catch(e){ setErr(e.message) } finally{ setLoading(false) }
  }
  return (
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo"><div className="auth-logo-icon"><I.wh/></div><div className="auth-logo-text">WAREHOUSE</div></div>

        </tbody></table>
      </div>
      {modal&&<Modal title="Новое задание" onClose={()=>setModal(false)} wide><ProcessingForm zones={zones} products={products} onSave={async(f)=>{ await api("/processing",{method:"POST",body:JSON.stringify(f)}); setModal(false); load(); toast({type:"ok",msg:"Создано"}); }} onClose={()=>setModal(false)}/></Modal>}
    </div>
  );
}

function ProcessingForm({zones,products,onSave,onClose}){
  const [form,setForm]=useState({zone_id:"",note:"",items:[{product_id:"",scanned:0,packed:0}]});
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");
  const addItem=()=>setForm(f=>({...f,items:[...f.items,{product_id:"",scanned:0,packed:0}]}));
  const removeItem=i=>setForm(f=>({...f,items:f.items.filter((_,idx)=>idx!==i)}));
  const setItem=(i,k,v)=>setForm(f=>({...f,items:f.items.map((it,idx)=>idx===i?{...it,[k]:v}:it)}));
  async function submit(e){ e.preventDefault(); setErr(""); setLoading(true); try{ await onSave({...form,zone_id:parseInt(form.zone_id),items:form.items.map(it=>({product_id:parseInt(it.product_id),scanned:parseInt(it.scanned)||0,packed:parseInt(it.packed)||0}))}); }catch(e){ setErr(e.message) } finally{ setLoading(false) } }
  return <form onSubmit={submit}>{err&&<div className="err">{err}</div>}<div className="g2"><div className="fg"><label>Участок</label><select className="field" value={form.zone_id} onChange={e=>setForm(f=>({...f,zone_id:e.target.value}))} required><option value="">—</option>{zones.map(z=><option key={z.id} value={z.id}>{z.name}</option>)}</select></div><div className="fg"><label>Примечание</label><input className="field" value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} placeholder="Смена 1"/></div></div><div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--t3)",letterSpacing:".08em",textTransform:"uppercase",marginBottom:8}}>Позиции (отсканировано / упаковано)</div><div className="items-list">{form.items.map((item,i)=>{ const lost=(parseInt(item.scanned)||0)-(parseInt(item.packed)||0); return <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 80px 80px 60px 28px",gap:8,alignItems:"center"}}><select className="field" value={item.product_id} onChange={e=>setItem(i,"product_id",e.target.value)} required><option value="">—</option>{products.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}</select><input className="field" type="number" value={item.scanned} onChange={e=>setItem(i,"scanned",e.target.value)} placeholder="Скан" min="0"/><input className="field" type="number" value={item.packed} onChange={e=>setItem(i,"packed",e.target.value)} placeholder="Упак" min="0"/><div style={{textAlign:"center"}}>{lost>0?<span className="badge b-red">-{lost}</span>:lost<0?<span className="badge b-amber">!</span>:<span className="badge b-green">ok</span>}</div><button type="button" className="ic-btn del" onClick={()=>removeItem(i)}><I.x/></button></div>; })}</div><button type="button" className="add-item-btn" onClick={addItem}><I.plus/>Добавить</button><div className="modal-foot"><button type="button" className="btn btn-ghost" onClick={onClose}>Отмена</button><button type="submit" className="btn btn-accent" disabled={loading}>{loading?"...":"Создать"}</button></div></form>;
}

function App(){
  const [authed,setAuthed]=useState(!!getToken());
  const [page,setPage]=useState("home");
  const [toast,setToast]=useState(null);
  const email=localStorage.getItem("wh_email")||"user";
  if(!authed) return <><Auth onLogin={()=>setAuthed(true)}/><Toast t={toast} set={setToast}/></>;
  const nav=[
    {id:"home",Icon:I.home,label:"Главная"},
    {section:"Каталог"},
    {id:"products",Icon:I.box,label:"Товары"},
    {section:"Склад"},
    {id:"zones",Icon:I.map,label:"Участки / Ячейки"},
    {id:"stock",Icon:I.stock,label:"Остатки"},
    {section:"Документы"},
    {id:"receipts",Icon:I.receipt,label:"Приёмка"},
    {id:"shipments",Icon:I.ship,label:"Отгрузка"},
    {id:"processing",Icon:I.scan,label:"Обработка"},
    {section:"Аналитика"},
    {id:"inventory",Icon:I.inv,label:"Инвентаризация"},
    {id:"movements",Icon:I.move,label:"Движения"},
  ];
  const titles={home:"Главная",products:"Товары",zones:"Участки и ячейки",stock:"Остатки",receipts:"Приёмка",shipments:"Отгрузка",processing:"Обработка",inventory:"Инвентаризация",movements:"История движений"};
  return (
    <>
      <div className="sidebar">
        <div className="sidebar-top"><div className="logo"><div className="logo-icon"><I.wh/></div><div><div className="logo-text">WAREHOUSE</div><div className="logo-version">WMS v1.0</div></div></div></div>
        <div className="nav">{nav.map((n,i)=>n.section?<div key={i} className="nav-label">{n.section}</div>:<div key={n.id} className={"nav-item"+(page===n.id?" active":"")} onClick={()=>setPage(n.id)}><n.Icon/>{n.label}</div>)}</div>
        <div className="sidebar-footer"><div className="user-card"><div className="user-av"><img src={AVATAR} alt=""/></div><div style={{flex:1,minWidth:0}}><div className="user-email">{email}</div><div className="user-role">jwt · active</div></div><button className="logout-btn" onClick={()=>{clearToken();setAuthed(false)}}><I.logout/></button></div></div>
      </div>
      <div className="main">
        <div className="topbar"><div className="page-title">{titles[page]}</div><div className="api-status"><div className="status-dot"/><span>localhost:8000</span></div></div>
        {page==="home"&&<Home setPage={setPage}/>}
        {page==="products"&&<Products toast={setToast}/>}
        {page==="zones"&&<Zones toast={setToast}/>}
        {page==="stock"&&<Stock toast={setToast}/>}
        {page==="receipts"&&<Receipts toast={setToast}/>}
        {page==="shipments"&&<Shipments toast={setToast}/>}
        {page==="processing"&&<Processing toast={setToast}/>}
        {page==="inventory"&&<Inventory toast={setToast}/>}
        {page==="movements"&&<Movements toast={setToast}/>}
      </div>
      <Toast t={toast} set={setToast}/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
